
upstream django {
    server django:8000;
}

server {
    listen 80;

    # respond to any hostname or IP
    server_name _;

    # safe without auth — CSS/JS/fonts contain no user data.
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }


    # All authenticated routes (login, cloud, files, media) are handled by Django, including file uploads/downloads.
    location / {
        proxy_pass http://django;

        # Pass real client info through to Django.
        proxy_set_header Host              $http_host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # ── Upload size ────────────────────────
        # 0 = no limit
        client_max_body_size 0;

        # ── Buffering ──────────────────────────
        # proxy_request_buffering off:
        # Without this, a 50GB upload would need 50GB of nginx temp space before Django even sees it.

        # proxy_buffering off:
        # nginx streams downloads directly to the client
        proxy_request_buffering off;
        proxy_buffering         off;

        # ── Timeouts ──────────────────────────
        # proxy_connect_timeout stays at a short value
        # Setting it to 0 means nginx would hang forever if Gunicorn is down or crashed, never returning an error.
        proxy_connect_timeout 75s;
        proxy_read_timeout    3600s;
        proxy_send_timeout    3600s;
    }
}
