<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — KornerCloud</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700;800&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { overflow-x: hidden; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #07090e;
            color: #dde4f0;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* ── Moon ────────────────────────────────── */
        .moon {
            position: fixed;
            top: 6vh; right: 9vw;
            width: 90px; height: 90px;
            border-radius: 50%;
            background:
                radial-gradient(circle at 62% 68%, rgba(100,110,120,0.5) 0%, transparent 22%),
                radial-gradient(circle at 28% 45%, rgba(80,90,100,0.4)  0%, transparent 18%),
                radial-gradient(circle at 40% 38%, #d0d6de 0%, #b0b8c4 40%, #8a9299 70%, #6e757d 100%);
            box-shadow:
                0 0 40px rgba(200,215,235,0.18),
                0 0 90px rgba(160,185,220,0.09);
            pointer-events: none;
            z-index: 0;
        }

        /* ── Mountains ───────────────────────────── */
        .mountains {
            position: fixed;
            bottom: 0; left: 0;
            width: 100%; height: 240px;
            pointer-events: none;
            z-index: 1;
        }
        .mountain-back, .mountain-front {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
        }
        .mountain-back  { height: 240px; }
        .mountain-front { height: 185px; }

        /* ── Stars ───────────────────────────────── */
        @keyframes twinkle {
            0%, 100% { opacity: 0.10; transform: scale(0.75); }
            50%       { opacity: 0.88; transform: scale(1.25); }
        }
        .star {
            position: fixed; border-radius: 50%; background: #fff;
            animation: twinkle ease-in-out infinite;
            pointer-events: none; z-index: 2;
        }

        /* ── Main content ────────────────────────── */
        .content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem;
            padding-bottom: calc(240px + 2rem);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .error-code {
            font-family: 'Sora', sans-serif;
            font-size: clamp(6rem, 20vw, 10rem);
            font-weight: 800;
            line-height: 1;
            color: rgba(255,255,255,0.06);
            letter-spacing: -0.04em;
            user-select: none;
            margin-bottom: -0.5rem;
        }

        .error-title {
            font-family: 'Sora', sans-serif;
            font-size: clamp(1.4rem, 4vw, 2rem);
            font-weight: 700;
            color: #eef3ff;
            letter-spacing: -0.01em;
            margin-bottom: 0.85rem;
        }

        .error-message {
            font-size: 0.95rem;
            color: #48596e;
            line-height: 1.65;
            max-width: 320px;
            margin-bottom: 2.2rem;
        }

        .btn-home {
            display: inline-block;
            padding: 0.82rem 2rem;
            background: #ffffff;
            color: #080d18;
            border-radius: 50px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 600;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s;
            box-shadow: 0 4px 22px rgba(255,255,255,0.10);
        }
        .btn-home:hover {
            background: #e8f0ff;
            transform: translateY(-1px);
        }

        @media (max-width: 480px) {
            .moon { width: 55px; height: 55px; top: 2vh; right: 4vw; }
            .mountains { height: 130px; }
            .mountain-back  { height: 130px; }
            .mountain-front { height:  98px; }
            .content { padding-bottom: calc(130px + 1.5rem); }
        }
    </style>
</head>
<body>

    <div class="moon"></div>

    <!-- Mountains -->
    <div class="mountains">
        <svg class="mountain-back" viewBox="0 0 1440 240"
             preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,240 L0,175 L55,200 L120,128 L185,200 L210,200 L285,102
                     L360,200 L385,200 L455,148 L525,200 L550,200 L625,85 L700,200
                     L725,200 L800,118 L875,200 L900,200 L970,95 L1040,200
                     L1065,200 L1135,138 L1205,200 L1230,200 L1300,110 L1370,200
                     L1440,200 L1440,240 Z" fill="#1a2d44"/>
        </svg>
        <svg class="mountain-front" viewBox="0 0 1440 185"
             preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0,185 L0,148 L65,148 L130,92 L195,148 L230,148 L300,62
                     L370,148 L405,148 L470,108 L535,148 L570,148 L640,52 L710,148
                     L745,148 L815,88 L885,148 L920,148 L990,68 L1060,148
                     L1095,148 L1160,100 L1225,148 L1260,148 L1330,75 L1400,148
                     L1440,148 L1440,185 Z" fill="#0e1d2e"/>
        </svg>
    </div>

    <!-- Stars -->
    <div class="star" style="left:4%;  top:8%;  width:2px;height:2px;animation-duration:3.1s;animation-delay:0.0s;"></div>
    <div class="star" style="left:12%; top:15%; width:1px;height:1px;animation-duration:4.6s;animation-delay:1.2s;"></div>
    <div class="star" style="left:22%; top:6%;  width:2px;height:2px;animation-duration:2.8s;animation-delay:0.5s;"></div>
    <div class="star" style="left:35%; top:20%; width:1px;height:1px;animation-duration:5.2s;animation-delay:2.1s;"></div>
    <div class="star" style="left:48%; top:5%;  width:3px;height:3px;animation-duration:3.7s;animation-delay:0.8s;"></div>
    <div class="star" style="left:60%; top:14%; width:1px;height:1px;animation-duration:4.1s;animation-delay:3.4s;"></div>
    <div class="star" style="left:72%; top:8%;  width:2px;height:2px;animation-duration:6.0s;animation-delay:1.7s;"></div>
    <div class="star" style="left:84%; top:20%; width:1px;height:1px;animation-duration:3.4s;animation-delay:0.3s;"></div>
    <div class="star" style="left:93%; top:10%; width:2px;height:2px;animation-duration:5.5s;animation-delay:2.8s;"></div>
    <div class="star" style="left:18%; top:38%; width:1px;height:1px;animation-duration:4.8s;animation-delay:0.6s;"></div>
    <div class="star" style="left:55%; top:32%; width:2px;height:2px;animation-duration:3.2s;animation-delay:1.5s;"></div>
    <div class="star" style="left:78%; top:35%; width:1px;height:1px;animation-duration:5.0s;animation-delay:2.6s;"></div>

    <!-- Content -->
    <div class="content">
        <div class="error-code">404</div>
        <h1 class="error-title">Page Not Found</h1>
        <p class="error-message">
            The page you're looking for doesn't exist
            or has been moved.
        </p>
        <a href="/cloud/" class="btn-home">Go Home</a>
    </div>

</body>
</html>
