{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}YouKnow Cloud{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Sora:wght@600;700&display=swap" rel="stylesheet">

    <style>
        /* ── Variables ───────────────────────────────── */
        :root {
            --bg:            #07090e;
            --mountain-far:  #1a2d44;
            --mountain-near: #0e1d2e;
            --card-bg:       rgba(13, 19, 31, 0.92);
            --card-border:   rgba(255, 255, 255, 0.07);
            --input-bg:      rgba(26, 36, 52, 0.95);
            --input-border:  rgba(255, 255, 255, 0.10);
            --input-focus:   rgba(255, 255, 255, 0.22);
            --text:          #e2e8f5;
            --text-muted:    #48596e;
            --text-sub:      #8a9bb0;
            --btn-bg:        #ffffff;
            --btn-text:      #080d18;
            --error:         #f07878;
            --success:       #6ec98a;
            --warning:       #f0c060;
            --radius-pill:   50px;
            --radius-card:   22px;
        }

        /* ── Reset ───────────────────────────────────── */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { overflow-x: hidden; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #07090e;
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            overflow-x: hidden;
            overflow-y: auto;
            position: relative;
        }

        /* ── Moon ────────────────────────────────────── */
        .moon {
            position: fixed;
            top: 5vh;
            right: 8vw;
            width: 130px;
            height: 130px;
            border-radius: 50%;
            z-index: 0;
            pointer-events: none;

            /* Realistic grey-white moon surface */
            background:
                radial-gradient(circle at 62% 68%, rgba(100,110,120,0.5) 0%, transparent 22%),
                radial-gradient(circle at 28% 45%, rgba(80,90,100,0.4) 0%, transparent 18%),
                radial-gradient(circle at 75% 30%, rgba(110,118,128,0.35) 0%, transparent 14%),
                radial-gradient(circle at 40% 38%, #d0d6de 0%, #b0b8c4 40%, #8a9299 70%, #6e757d 100%);

            box-shadow:
                0 0  50px rgba(200, 215, 235, 0.20),
                0 0 100px rgba(160, 185, 220, 0.10),
                0 0 180px rgba(120, 155, 200, 0.06);
        }

        /* ── Mountains ───────────────────────────────── */
        .mountains {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 280px;
            z-index: 1;
            pointer-events: none;
        }

        .mountain-back,
        .mountain-front {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
        }

        .mountain-back  { height: 280px; }
        .mountain-front { height: 200px; }

        /* ── Page wrapper ────────────────────────────── */
        .page-wrapper {
            position: relative;
            z-index: 10;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 2rem calc(280px + 2rem);
        }

        /* ── Card ────────────────────────────────────── */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-card);
            padding: 2.6rem 2.2rem 2.2rem;
            width: 100%;
            max-width: 420px;
            box-shadow:
                0 4px 6px  rgba(0, 0, 0, 0.3),
                0 20px 60px rgba(0, 0, 0, 0.5);
            animation: cardIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── Title ───────────────────────────────────── */
        .card-title {
            font-family: 'Sora', sans-serif;
            font-size: 1.85rem;
            font-weight: 700;
            text-align: center;
            color: #f0f4ff;
            margin-bottom: 1.8rem;
            letter-spacing: -0.01em;
        }

        /* ── Inputs ──────────────────────────────────── */
        .field {
            position: relative;
            margin-bottom: 0.85rem;
        }

        .field input {
            width: 100%;
            padding: 0.82rem 2.8rem 0.82rem 1.4rem;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius-pill);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.95rem;
            font-weight: 400;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            -webkit-text-size-adjust: 100%;
        }

        @supports (-webkit-touch-callout: none) {
            .field input { font-size: 1rem; }
        }

        .field input::placeholder { color: var(--text-muted); }

        .field input:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.06);
        }

        /* ── Field icon ──────────────────────────────── */
        .field-icon {
            position: absolute;
            right: 1.2rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 0.85rem;
            pointer-events: none;
            line-height: 1;
        }

        /* ── Button ──────────────────────────────────── */
        .btn-primary {
            display: block;
            width: 100%;
            padding: 0.88rem;
            margin-top: 1rem;
            background: var(--btn-bg);
            color: var(--btn-text);
            border: none;
            border-radius: var(--radius-pill);
            font-family: 'DM Sans', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.01em;
            text-align: center;
            text-decoration: none;
            cursor: pointer;
            min-height: 48px;
            transition: background 0.2s, transform 0.15s, box-shadow 0.2s, opacity 0.2s;
            box-shadow: 0 2px 16px rgba(255, 255, 255, 0.10);
        }

        .btn-primary:hover {
            background: #f0f4ff;
            transform: translateY(-1px);
            box-shadow: 0 4px 24px rgba(255, 255, 255, 0.16);
        }

        .btn-primary:active { transform: translateY(0); opacity: 0.92; }

        /* ── Card footer ─────────────────────────────── */
        .card-footer {
            text-align: center;
            margin-top: 1.3rem;
            font-size: 0.87rem;
            color: var(--text-sub);
        }

        .card-footer a {
            color: var(--text-sub);
            text-decoration: none;
            font-weight: 500;
            display: inline-block;
            padding: 0.25rem 0;
            transition: color 0.2s;
        }

        .card-footer a:hover { color: var(--text); }

        .card-footer .sep {
            margin: 0 0.5rem;
            opacity: 0.4;
        }

        /* ── Messages ────────────────────────────────── */
        .messages { margin-bottom: 1rem; }

        .message {
            padding: 0.65rem 1rem;
            border-radius: 12px;
            font-size: 0.875rem;
            font-weight: 500;
            margin-bottom: 0.45rem;
            line-height: 1.45;
        }

        .message.error   { background: rgba(240,120,120,0.10); color: var(--error);   border: 1px solid rgba(240,120,120,0.20); }
        .message.success { background: rgba(110,201,138,0.10); color: var(--success); border: 1px solid rgba(110,201,138,0.20); }
        .message.warning { background: rgba(240,192, 96,0.10); color: var(--warning); border: 1px solid rgba(240,192, 96,0.20); }

        /* ── Modal ───────────────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(4, 6, 12, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            padding: 1.5rem;
            overflow-y: auto;
            animation: fadeIn 0.25s ease both;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }

        .modal {
            background: rgba(11, 17, 28, 0.98);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            padding: 2.2rem 2rem;
            max-width: 360px;
            width: 100%;
            text-align: center;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.7);
            animation: modalIn 0.32s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes modalIn {
            from { transform: scale(0.92) translateY(14px); opacity: 0; }
            to   { transform: scale(1)    translateY(0);    opacity: 1; }
        }

        .modal-title {
            font-family: 'Sora', sans-serif;
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 0.85rem;
        }

        .modal p {
            color: var(--text-sub);
            font-size: 0.94rem;
            line-height: 1.65;
            margin-bottom: 1.4rem;
        }

        /* ════════════════════════════════════════════════
           RESPONSIVE
           ════════════════════════════════════════════════ */

        @media (max-width: 768px) {
            .moon { width: 90px; height: 90px; top: 3vh; right: 5vw; }

            .mountains      { height: 200px; }
            .mountain-back  { height: 200px; }
            .mountain-front { height: 145px; }

            .page-wrapper { padding-bottom: calc(200px + 1.5rem); }
        }

        @media (max-width: 480px) {
            .moon { width: 60px; height: 60px; top: 2vh; right: 4vw; }

            .mountains      { height: 140px; }
            .mountain-back  { height: 140px; }
            .mountain-front { height: 105px; }

            .page-wrapper {
                padding: 2rem 1rem calc(140px + 1.2rem);
                align-items: flex-start;
            }

            .card {
                padding: 1.9rem 1.4rem 1.7rem;
                border-radius: 18px;
            }

            .card-title { font-size: 1.55rem; margin-bottom: 1.4rem; }

            .field input { padding: 0.78rem 2.4rem 0.78rem 1.2rem; }

            .btn-primary  { font-size: 0.95rem; }
            .card-footer  { font-size: 0.82rem; margin-top: 1.1rem; }
            .message      { font-size: 0.83rem; }
            .modal        { padding: 1.7rem 1.3rem; border-radius: 16px; }
            .modal p      { font-size: 0.88rem; }
        }

        @media (max-width: 360px) {
            .moon { width: 48px; height: 48px; }

            .mountains      { height: 110px; }
            .mountain-back  { height: 110px; }
            .mountain-front { height:  82px; }

            .page-wrapper   { padding-bottom: calc(110px + 1rem); }

            .card { padding: 1.6rem 1.2rem 1.5rem; border-radius: 16px; }
            .card-title { font-size: 1.35rem; }
        }
    </style>

    {% block extra_head %}{% endblock %}
</head>
<body>

    <!-- Moon -->
    <div class="moon"></div>

    <!-- Mountains: geometric angular peaks matching reference image -->
    <div class="mountains">

        <!-- Back range — lighter blue-grey, taller peaks -->
        <svg class="mountain-back" viewBox="0 0 1440 280"
             preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="
                M0,280 L0,200
                L55,200  L120,128 L185,200
                L210,200 L285,102 L360,200
                L385,200 L455,148 L525,200
                L550,200 L625,85  L700,200
                L725,200 L800,118 L875,200
                L900,200 L970,95  L1040,200
                L1065,200 L1135,138 L1205,200
                L1230,200 L1300,110 L1370,200
                L1440,200 L1440,280 Z"
                  fill="#1a2d44"/>
        </svg>

        <!-- Front range — darker, shorter, in front -->
        <svg class="mountain-front" viewBox="0 0 1440 200"
             preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
            <path d="
                M0,200 L0,148
                L65,148  L130,92  L195,148
                L230,148 L300,62  L370,148
                L405,148 L470,108 L535,148
                L570,148 L640,52  L710,148
                L745,148 L815,88  L885,148
                L920,148 L990,68  L1060,148
                L1095,148 L1160,100 L1225,148
                L1260,148 L1330,75  L1400,148
                L1440,148 L1440,200 Z"
                  fill="#0e1d2e"/>
        </svg>

    </div>

    {% block stars %}{% endblock %}

    <div class="page-wrapper">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
